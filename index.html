<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased min-h-screen selection:bg-emerald-500 selection:text-gray-950">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KONFIGURASI DATABASE ---
        const DEFAULT_APP_ID = 'gki-bs-badminton';
        const FALLBACK_FIREBASE_CONFIG = {
          apiKey: "AIzaSyAKWV_5Y9gWh7_Mp33YeTYS-v0kGGO0K0s",
          authDomain: "gki-bs-badminton-play.firebaseapp.com",
          projectId: "gki-bs-badminton-play",
          storageBucket: "gki-bs-badminton-play.firebasestorage.app",
          messagingSenderId: "496261059958",
          appId: "1:496261059958:web:8b58e42f05dbc24fd3d657",
          measurementId: "G-VFEJCT46PF"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : FALLBACK_FIREBASE_CONFIG;
        const appId = typeof __app_id !== 'undefined' ? __app_id : DEFAULT_APP_ID;

        // Inisialisasi Firebase Sekali Saja Secara Global
        if (!window.firebase.apps.length) {
          window.firebase.initializeApp(firebaseConfig);
        }
        const auth = window.firebase.auth();
        const db = window.firebase.firestore();

        // --- DATA BACKUP ASLI GKI-BS (Dari JSON Bapak) ---
        const INITIAL_PLAYERS = [
          { "id": "p1", "name": "Pak T. H. Hutagalung", "type": "monthly", "fee": 100000, "checks": 3, "stats": { "played": 12, "won": 8, "lost": 4 } },
          { "id": "p2", "name": "Pak W. Napitupulu", "type": "monthly", "fee": 100000, "checks": 2, "stats": { "played": 8, "won": 5, "lost": 3 } },
          { "id": "p3", "name": "Pak Handi Muliawan", "type": "monthly", "fee": 100000, "checks": 3, "stats": { "played": 14, "won": 10, "lost": 4 } },
          { "id": "p4", "name": "Pak Veky Pamintu", "type": "monthly", "fee": 100000, "checks": 2, "stats": { "played": 6, "won": 3, "lost": 3 } },
          { "id": "p5", "name": "Pak N. Sitohang", "type": "monthly", "fee": 100000, "checks": 6, "stats": { "played": 20, "won": 13, "lost": 7 } },
          { "id": "p6", "name": "Pak M.V. Sitinjak", "type": "monthly", "fee": 100000, "checks": 2, "stats": { "played": 10, "won": 4, "lost": 6 } },
          { "id": "p7", "name": "Pak Jeff Ma", "type": "monthly", "fee": 100000, "checks": 3, "stats": { "played": 11, "won": 7, "lost": 4 } },
          { "id": "p8", "name": "Pak R.Tambunan", "type": "monthly", "fee": 100000, "checks": 3, "stats": { "played": 15, "won": 9, "lost": 6 } },
          { "id": "p9", "name": "Pak G.Sagala", "type": "monthly", "fee": 100000, "checks": 4, "stats": { "played": 16, "won": 11, "lost": 5 } },
          { "id": "p10", "name": "Pak M.F.Gultom", "type": "monthly", "fee": 100000, "checks": 2, "stats": { "played": 9, "won": 4, "lost": 5 } },
          { "id": "p11", "name": "Pak E.Sitorus", "type": "per_play", "fee": 25000, "checks": 7, "stats": { "played": 18, "won": 10, "lost": 8 } },
          { "id": "p12", "name": "Pak J. Siagian", "type": "per_play", "fee": 25000, "checks": 1, "stats": { "played": 4, "won": 1, "lost": 3 } },
          { "id": "p13", "name": "Pak F. Tripika", "type": "per_play", "fee": 25000, "checks": 2, "stats": { "played": 8, "won": 5, "lost": 3 } },
          { "id": "p14", "name": "Pak H. Sihotang", "type": "per_play", "fee": 25000, "checks": 1, "stats": { "played": 3, "won": 1, "lost": 2 } }
        ];

        const INITIAL_TRANSACTIONS = [
          { "id": "t1", "type": "credit", "amount": 3325000, "description": "Iuran kumulatif seluruh anggota (Hutagalung dkk)", "date": "2026-06-02", "note": "Saldo Kas Terkumpul" },
          { "id": "t2", "type": "debit", "amount": 3026000, "description": "Uang keluar (Sewa Lapangan, Kok, Konsumsi)", "date": "2026-06-02", "note": "Total Biaya Pengeluaran Sebelumnya" }
        ];

        const INITIAL_SESSIONS = [
          {
            "id": "s1",
            "date": "2026-06-08",
            "day": "Senin",
            "location": "Axton Arena MB2",
            "court": "Court 3",
            "time": "19:00 - 21:00",
            "courtCost": 110000,
            "shuttlecockCost": 145000,
            "rsvps": { "p3": "YES", "p2": "MAYBE" }
          }
        ];

        const INITIAL_TACTICAL = [
            { id: 'tp1', label: 'T1-A', x: 75, y: 150, color: '#3B82F6' },
            { id: 'tp2', label: 'T1-B', x: 75, y: 250, color: '#3B82F6' },
            { id: 'tp3', label: 'T2-A', x: 225, y: 150, color: '#EF4444' },
            { id: 'tp4', label: 'T2-B', x: 225, y: 250, color: '#EF4444' },
        ];

        // --- SISTEM LOAD DATA CERDAS ---
        const loadInitialData = () => {
            try {
                const local = localStorage.getItem('gki_bs_data');
                if (local) return JSON.parse(local);
            } catch (e) {}
            return {
                players: INITIAL_PLAYERS,
                sessions: INITIAL_SESSIONS,
                transactions: INITIAL_TRANSACTIONS,
                matches: [],
                tacticalPlayers: INITIAL_TACTICAL,
                updatedAt: 0
            };
        };

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          
          // --- REACT STATE BERBASIS DATA LOKAL ---
          const initialData = loadInitialData();
          const [players, setPlayers] = useState(initialData.players);
          const [sessions, setSessions] = useState(initialData.sessions);
          const [transactions, setTransactions] = useState(initialData.transactions);
          const [matches, setMatches] = useState(initialData.matches);
          const [tacticalPlayers, setTacticalPlayers] = useState(initialData.tacticalPlayers);

          // Referensi memori terpadu agar penulisan sinkron instan
          const stateRef = useRef(initialData);
          const localUpdatedAt = useRef(initialData.updatedAt || 0);

          // Form State
          const [newPlayerName, setNewPlayerName] = useState('');
          const [newPlayerType, setNewPlayerType] = useState('monthly');
          const [newPlayerChecks, setNewPlayerChecks] = useState(0);
          const [guestName, setGuestName] = useState('');
          const [guestType, setGuestType] = useState('per_play');
          const [txType, setTxType] = useState('credit');
          const [txAmount, setTxAmount] = useState('');
          const [txDesc, setTxDesc] = useState('');
          const [txPlayerId, setTxPlayerId] = useState('');
          const [txSlip, setTxSlip] = useState(null);
          
          // Scoreboard Live State
          const [dPlayer1, setDPlayer1] = useState('');
          const [dPlayer2, setDPlayer2] = useState('');
          const [dPlayer3, setDPlayer3] = useState('');
          const [dPlayer4, setDPlayer4] = useState('');
          const [scoreA, setScoreA] = useState(0);
          const [scoreB, setScoreB] = useState(0);

          const [notification, setNotification] = useState(null);
          const [workspaceUrl, setWorkspaceUrl] = useState('');
          const [selectedSlip, setSelectedSlip] = useState(null);

          const canvasRef = useRef(null);
          const [draggingId, setDraggingId] = useState(null);
          
          // Firebase Auth & Connection State
          const [user, setUser] = useState(null);
          const [cloudStatus, setCloudStatus] = useState('pending'); // 'pending', 'connected', 'offline_fallback', 'error_firestore'
          const [diagnosticLogs, setDiagnosticLogs] = useState([]);
          const [firebaseErrorMessage, setFirebaseErrorMessage] = useState('');

          const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

          const addLog = (msg) => {
            const time = new Date().toLocaleTimeString('id-ID');
            setDiagnosticLogs(prev => [...prev, `[${time}] ${msg}`]);
          };

          // =========================================================================
          // ENGINE SINKRONISASI BARU (EVENT-DRIVEN & CONFLICT-FREE)
          // =========================================================================

          // FUNGSI INTI PENULISAN: Menyimpan ke lokal & Mendorong ke Cloud jika terhubung
          const persistData = (updatedFields) => {
            const newTimestamp = Date.now(); // Stempel waktu aktual memastikan anti-tabrakan
            const payload = {
                players: stateRef.current.players,
                sessions: stateRef.current.sessions,
                transactions: stateRef.current.transactions,
                matches: stateRef.current.matches,
                tacticalPlayers: stateRef.current.tacticalPlayers,
                ...updatedFields,
                updatedAt: newTimestamp
            };

            // 1. Simpan di Memori Ref instan
            stateRef.current = payload;
            localUpdatedAt.current = newTimestamp;

            // 2. Simpan di Local Storage Browser
            localStorage.setItem('gki_bs_data', JSON.stringify(payload));

            // 3. Tulis Langsung Ke Cloud (Hanya jika terhubung dan login berhasil!)
            if (cloudStatus === 'connected' && workspaceUrl && user) {
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('gki_bs_rooms').doc(workspaceUrl)
                  .set(payload)
                  .catch(err => {
                      console.error("Gagal mengirim ke cloud:", err);
                      addLog("⚠️ Jaringan putus sesaat. Data tersimpan di memori perangkat.");
                  });
            }
          };

          // TAHAP 1: OTENTIKASI ANONIM (MANDATORY RULE 3)
          useEffect(() => {
            const doAuth = async () => {
              addLog("Memeriksa kredensial identitas anonim...");
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                  await auth.signInAnonymously();
                }
              } catch (error) {
                addLog(`❌ Gagal masuk jaringan: ${error.message}`);
                setCloudStatus('offline_fallback');
                setFirebaseErrorMessage(`Otentikasi Anonim Ditolak: ${error.message}`);
              }
            };
            doAuth();

            const unsubAuth = auth.onAuthStateChanged(currentUser => {
              if (currentUser) {
                addLog(`👤 Identitas disetujui. UID: ${currentUser.uid.substring(0,6)}...`);
                setUser(currentUser);
              }
            });
            return () => unsubAuth();
          }, []);

          // TAHAP 2: PEMANTAUAN RUANG DATA FIRESTORE
          useEffect(() => {
            if (!user) return; // Gerbang Pengaman: Tunggu login selesai

            const params = new URLSearchParams(window.location.search);
            const activeRoomId = params.get('workspace') || 'GKI_BS_DEFAULT_ROOM';
            setWorkspaceUrl(activeRoomId);

            addLog(`📡 Mengetuk pintu server Room: #${activeRoomId}...`);

            const roomRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('gki_bs_rooms').doc(activeRoomId);
            
            const unsubFirestore = roomRef.onSnapshot(doc => {
              if (doc.exists) {
                const cloudData = doc.data();
                // RESOLUSI RACE CONDITION: Hanya terima jika waktu pembaruan Cloud LEBIH BARU dari aktivitas lokal terakhir
                if (cloudData.updatedAt > localUpdatedAt.current) {
                  addLog("📥 Menerima paket data Skuad terbaru dari Cloud!");
                  
                  localUpdatedAt.current = cloudData.updatedAt;
                  stateRef.current = cloudData;
                  
                  // Sinkronkan ke tampilan Layar
                  setPlayers(cloudData.players || INITIAL_PLAYERS);
                  setSessions(cloudData.sessions || INITIAL_SESSIONS);
                  setTransactions(cloudData.transactions || INITIAL_TRANSACTIONS);
                  setMatches(cloudData.matches || []);
                  setTacticalPlayers(cloudData.tacticalPlayers || INITIAL_TACTICAL);
                  
                  // Backup ke Storage Browser pengguna
                  localStorage.setItem('gki_bs_data', JSON.stringify(cloudData));
                }
              } else {
                addLog(`🆕 Membuka Room #${activeRoomId} perdana. Memasukkan data lokal...`);
                // Ruang kosong? Mari kita isi dengan data lokal pengguna ini.
                persistData({}); 
              }
              setCloudStatus('connected');
            }, err => {
              addLog(`❌ Firebase memblokir koneksi: ${err.message}`);
              setCloudStatus('error_firestore');
              setFirebaseErrorMessage(`Firebase Rule Tertutup: ${err.message}`);
            });

            return () => unsubFirestore();
          }, [user]);

          // =========================================================================

          const showToast = (message, type = 'info') => {
            setNotification({ message, type });
            setTimeout(() => setNotification(null), 3000);
          };

          const openConfirm = (title, message, onConfirm) => {
            setConfirmModal({
              isOpen: true,
              title,
              message,
              onConfirm: () => {
                onConfirm();
                setConfirmModal(prev => ({ ...prev, isOpen: false }));
              }
            });
          };

          const copyWorkspaceLink = () => {
            let activeRoomId = workspaceUrl;
            if (!activeRoomId || activeRoomId === 'GKI_BS_DEFAULT_ROOM') {
              activeRoomId = 'GKI_BS_' + Math.random().toString(36).substring(2, 8).toUpperCase();
              setWorkspaceUrl(activeRoomId);
              const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?workspace=${activeRoomId}`;
              window.history.replaceState({ path: newUrl }, '', newUrl);
            }
            const shareUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + `?workspace=${activeRoomId}`;
            copyTextToClipboard(shareUrl);
            showToast(`Tautan Room Skuad berhasil disalin! Silakan bagikan. 📲`, "success");
            persistData({}); // Pancing pendaftaran ID Room ke cloud
          };

          const exportBackupJson = () => {
            const payload = { players, sessions, transactions, matches, tacticalPlayers };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(payload, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `gki_bs_backup.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
          };

          const importBackupJson = (e) => {
            const fileReader = new FileReader();
            fileReader.onload = (event) => {
              try {
                const parsed = JSON.parse(event.target.result);
                if (parsed.players) setPlayers(parsed.players);
                if (parsed.sessions) setSessions(parsed.sessions);
                if (parsed.transactions) setTransactions(parsed.transactions);
                if (parsed.matches) setMatches(parsed.matches);
                persistData(parsed);
                showToast("Data Impor Berhasil Diterapkan & Mengudara! ✅", "success");
              } catch (err) {
                showToast("Format Berkas JSON Salah! ❌", "error");
              }
            };
            if (e.target.files[0]) fileReader.readAsText(e.target.files[0]);
          };

          // Kompresi Gambar Nota Cerdas
          const handleSlipImageUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                const max_size = 400; // Dikompres ke 400px agar ringan dikirim di jaringan lambat
                let width = img.width;
                let height = img.height;
                if (width > height) {
                  if (width > max_size) { height *= max_size / width; width = max_size; }
                } else {
                  if (height > max_size) { width *= max_size / height; height = max_size; }
                }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // 70% quality JPG
                setTxSlip(dataUrl);
                showToast("Bukti nota siap! 📸", "success");
              };
              img.src = event.target.result;
            };
            reader.readAsDataURL(file);
          };

          const totalUangMasuk = transactions.filter(t => t.type === 'credit').reduce((sum, t) => sum + t.amount, 0);
          const totalUangKeluar = transactions.filter(t => t.type === 'debit').reduce((sum, t) => sum + t.amount, 0);
          const saldoKas = totalUangMasuk - totalUangKeluar;

          // --- LOGIKA EVENT HANDLERS DENGAN AUTOSAVE INSTAN ---
          const incrementCheck = (id) => {
            const updated = players.map(p => p.id === id ? { ...p, checks: p.checks + 1 } : p);
            setPlayers(updated);
            persistData({ players: updated });
          };

          const decrementCheck = (id) => {
            const updated = players.map(p => p.id === id && p.checks > 0 ? { ...p, checks: p.checks - 1 } : p);
            setPlayers(updated);
            persistData({ players: updated });
          };

          const addNewPlayer = (e) => {
            e.preventDefault();
            if (!newPlayerName.trim()) return;
            const isMonthly = newPlayerType === 'monthly';
            const newP = {
              id: 'p_' + Date.now(), name: newPlayerName.trim(), type: newPlayerType,
              fee: isMonthly ? 100000 : 25000, checks: Number(newPlayerChecks) || 0, stats: { played: 0, won: 0, lost: 0 }
            };
            const updated = [...players, newP];
            setPlayers(updated);
            setNewPlayerName(''); setNewPlayerChecks(0);
            showToast(`${newP.name} Terdaftar!`, "success");
            persistData({ players: updated });
          };

          const handleQuickAddGuest = (sessionId, e) => {
            e.preventDefault();
            if (!guestName.trim()) return;
            const newGuestId = 'p_guest_' + Date.now();
            const newGuest = {
              id: newGuestId, name: guestName.trim() + " (Tamu)", type: guestType,
              fee: guestType === 'monthly' ? 100000 : 25000, checks: 0, stats: { played: 0, won: 0, lost: 0 }
            };
            const updatedPlayers = [...players, newGuest];
            const updatedSessions = sessions.map(s => s.id === sessionId ? { ...s, rsvps: { ...s.rsvps, [newGuestId]: 'YES' } } : s);
            
            setPlayers(updatedPlayers); setSessions(updatedSessions); setGuestName('');
            showToast(`${newGuest.name} Ditambahkan ke RSVP! ✅`, "success");
            persistData({ players: updatedPlayers, sessions: updatedSessions });
          };

          const removePlayer = (id, name) => {
            openConfirm("Hapus Anggota Skuad", `Yakin ingin mencoret ${name} dari daftar anggota GKI-BS?`, () => {
              const updated = players.filter(p => p.id !== id);
              setPlayers(updated);
              showToast("Pemain berhasil dihapus.");
              persistData({ players: updated });
            });
          };

          const addTransaction = (e) => {
            e.preventDefault();
            const parsedAmount = parseFloat(txAmount);
            if (isNaN(parsedAmount) || parsedAmount <= 0 || !txDesc.trim()) { showToast("Input tidak valid!", "error"); return; }
            let finalDesc = txDesc;
            let updatedPlayers = players;

            if (txType === 'credit' && txPlayerId) {
              const p = players.find(x => x.id === txPlayerId);
              if (p) { 
                finalDesc = `Bayar Iuran - ${p.name}: ${txDesc}`; 
                updatedPlayers = players.map(x => x.id === txPlayerId ? { ...x, checks: x.checks + 1 } : x);
                setPlayers(updatedPlayers);
              }
            }
            
            const newTx = {
              id: 't_' + Date.now(), type: txType, amount: parsedAmount, description: finalDesc,
              date: new Date().toISOString().slice(0,10), note: txType === 'credit' ? 'Uang Masuk / Iuran' : 'Uang Keluar / Biaya',
              slip: txSlip // Gambar base64
            };
            const updatedTransactions = [newTx, ...transactions];
            setTransactions(updatedTransactions);
            setTxAmount(''); setTxDesc(''); setTxPlayerId(''); setTxSlip(null);
            showToast("Transaksi Jurnal Tercatat! 💰", "success");
            persistData({ transactions: updatedTransactions, players: updatedPlayers });
          };

          const removeTransaction = (id) => {
            openConfirm("Hapus Catatan Jurnal", "Hapus catatan transaksi keuangan ini dari pembukuan?", () => {
              const updated = transactions.filter(t => t.id !== id);
              setTransactions(updated);
              showToast("Catatan kas terhapus.");
              persistData({ transactions: updated });
            });
          };

          const handleRsvpChange = (sessionId, playerId, status) => {
            const updated = sessions.map(s => s.id === sessionId ? { ...s, rsvps: { ...s.rsvps, [playerId]: status } } : s);
            setSessions(updated);
            persistData({ sessions: updated });
          };

          const resetAllRsvps = (sessionId) => {
            openConfirm("Kosongkan RSVP Skuad", "Yakin ingin mengosongkan seluruh konfirmasi kehadiran?", () => {
              const updated = sessions.map(s => s.id === sessionId ? { ...s, rsvps: {} } : s);
              setSessions(updated);
              showToast("RSVP dikosongkan! 🔄", "success");
              persistData({ sessions: updated });
            });
          };

          const saveMatchResult = () => {
            if (!dPlayer1 || !dPlayer2 || !dPlayer3 || !dPlayer4 || scoreA === scoreB) { showToast("Konfigurasi skuad/skor salah!", "error"); return; }
            const nameA1 = players.find(p => p.id === dPlayer1)?.name || 'Pemain A1';
            const nameA2 = players.find(p => p.id === dPlayer2)?.name || 'Pemain A2';
            const nameB1 = players.find(p => p.id === dPlayer3)?.name || 'Pemain B1';
            const nameB2 = players.find(p => p.id === dPlayer4)?.name || 'Pemain B2';
            const newMatch = { id: 'm_' + Date.now(), team1: [nameA1, nameA2], team2: [nameB1, nameB2], score1: scoreA, score2: scoreB, date: new Date().toISOString().slice(0, 10) };
            
            const winningTeam = scoreA > scoreB ? 'team1' : 'team2';
            const activePlayerIds = [dPlayer1, dPlayer2, dPlayer3, dPlayer4];
            
            const updatedPlayers = players.map(p => {
              if (activePlayerIds.includes(p.id)) {
                const isTeam1 = p.id === dPlayer1 || p.id === dPlayer2;
                const won = (isTeam1 && winningTeam === 'team1') || (!isTeam1 && winningTeam === 'team2');
                return { ...p, stats: { played: (p.stats?.played || 0) + 1, won: (p.stats?.won || 0) + (won ? 1 : 0), lost: (p.stats?.lost || 0) + (won ? 0 : 1) } };
              }
              return p;
            });
            const updatedMatches = [newMatch, ...matches];
            
            setPlayers(updatedPlayers); setMatches(updatedMatches); 
            showToast("Hasil Game Diabadikan! 🏆", "success"); 
            setScoreA(0); setScoreB(0);
            persistData({ players: updatedPlayers, matches: updatedMatches });
          };

          const copyKeuanganWhatsApp = () => {
            const playerLines = players.map(p => `${p.name} ${"✅".repeat(p.checks)} ${p.type === 'monthly' ? "payment monthly rp 100000" : "payment per play Rp25.000,."}`).join('\n');

            copyTextToClipboard(template);
            showToast("Format laporan keuangan disalin ke clipboard! 📲", "success");
          };

          const copyRsvpWhatsApp = (session) => {
            const yesList = [], noList = [], maybeList = [], blankList = [];
            players.forEach(p => {
              const s = session.rsvps?.[p.id] || 'NO_RESPONSE';
              if (s === 'YES') yesList.push(p.name);
              else if (s === 'NO') noList.push(p.name);
              else if (s === 'MAYBE') maybeList.push(p.name);
              else blankList.push(p.name);
            });
            const template = `🏸 *GKI-BS Badminton Play RSVP* 🏸\n*Jadwal:* ${session.date} | ${session.time}\n*Tempat:* ${session.location} (${session.court})\n\n*Daftar Hadir (${yesList.length}):*\n${yesList.map((n,i)=>`${i+1}. ${n} ✅`).join('\n')}\n\n*Belum Konfirmasi:* ${blankList.join(', ')}`;
            copyTextToClipboard(template);
            showToast("Format list RSVP disalin ke clipboard! 📲", "success");
          };

          const copyTextToClipboard = (text) => {
            const el = document.createElement("textarea"); el.value = text; el.style.position = "fixed"; document.body.appendChild(el);
            el.focus(); el.select(); document.execCommand('copy'); document.body.removeChild(el);
          };

          useEffect(() => { if (activeTab === 'tactical') redrawCanvas(); }, [activeTab, tacticalPlayers]);

          const redrawCanvas = () => {
            const cv = canvasRef.current; if (!cv) return;
            const ctx = cv.getContext('2d'); ctx.fillStyle = '#065F46'; ctx.fillRect(0, 0, cv.width, cv.height);
            ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 3; ctx.strokeRect(15, 15, cv.width - 30, cv.height - 30);
            ctx.beginPath(); ctx.moveTo(15, cv.height / 2); ctx.lineTo(cv.width - 15, cv.height / 2); ctx.stroke();
            tacticalPlayers.forEach(p => {
              ctx.beginPath(); ctx.arc(p.x, p.y, 16, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); ctx.strokeStyle = '#FFFFFF'; ctx.stroke();
              ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(p.label, p.x, p.y);
            });
          };

          const handleCanvasMouseDown = (e) => {
            const rect = canvasRef.current.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            const match = tacticalPlayers.find(p => Math.hypot(p.x - x, p.y - y) < 20);
            if (match) setDraggingId(match.id);
          };

          const handleCanvasMouseMove = (e) => {
            if (!draggingId) return;
            const rect = canvasRef.current.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            setTacticalPlayers(prev => prev.map(p => p.id === draggingId ? { ...p, x, y } : p));
          };

          const handleCanvasTouchStart = (e) => {
            if (e.touches.length === 1) {
              const touch = e.touches[0];
              const rect = canvasRef.current.getBoundingClientRect();
              const match = tacticalPlayers.find(p => Math.hypot(p.x - (touch.clientX - rect.left), p.y - (touch.clientY - rect.top)) < 25);
              if (match) setDraggingId(match.id);
            }
          };

          const handleCanvasTouchMove = (e) => {
            if (!draggingId) return;
            if (e.touches.length === 1) {
              const touch = e.touches[0];
              const rect = canvasRef.current.getBoundingClientRect();
              setTacticalPlayers(prev => prev.map(p => p.id === draggingId ? { ...p, x: touch.clientX - rect.left, y: touch.clientY - rect.top } : p));

          };

{`rules_version = '2';

                    <div className="overflow-x-auto">
                      <table className="w-full text-left">
                        <thead><tr className="bg-gray-950 text-xs text-gray-400 uppercase"><th className="p-4">Nama</th><th className="p-4">Jenis</th><th className="p-4">Checkmarks</th><th className="p-4">Total Kas</th><th className="p-4 text-center">Aksi</th></tr></thead>
                        <tbody className="divide-y divide-gray-800">
                          {players.map(p => (
                            <tr key={p.id} className="hover:bg-gray-900/10 transition-all">
                              <td className="p-4 font-bold text-white">{p.name}</td>
                              <td className="p-4 text-xs">{p.type === 'monthly' ? 'Bulanan' : 'Per Main'}</td>
                              <td className="p-4">{"✅".repeat(p.checks) || "Belum Bayar"}</td>
                              <td className="p-4 text-emerald-400 font-bold">Rp {(p.type === 'monthly' ? p.checks * 100000 : p.checks * 25000).toLocaleString('id-ID')}</td>
                              <td className="p-4 flex justify-center gap-2">
                                <button onClick={() => incrementCheck(p.id)} className="w-8 h-8 rounded bg-emerald-950 text-emerald-400 font-bold hover:bg-emerald-900 transition-all">+✅</button>
                                <button onClick={() => decrementCheck(p.id)} className="w-8 h-8 rounded bg-red-950 text-red-400 font-bold hover:bg-red-900 transition-all">-✅</button>
                                <button onClick={() => removePlayer(p.id, p.name)} className="w-8 h-8 rounded bg-gray-950 text-gray-500 hover:text-white transition-all">🗑️</button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {activeTab === 'matchmaker' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in fade-in duration-200">
                    <div className="bg-gray-900 border border-gray-800 p-6 rounded-3xl shadow-xl space-y-4">
                      <h3 className="text-lg font-bold text-white">Lineup Tanding Ganda</h3>
                      <select value={dPlayer1} onChange={(e) => setDPlayer1(e.target.value)} className="w-full bg-gray-950 border border-gray-800 p-2.5 text-sm rounded-xl text-white focus:outline-none"><option value="">Pemain A1</option>{players.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select>
                      <select value={dPlayer2} onChange={(e) => setDPlayer2(e.target.value)} className="w-full bg-gray-950 border border-gray-800 p-2.5 text-sm rounded-xl text-white focus:outline-none"><option value="">Pemain A2</option>{players.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select>
                      <select value={dPlayer3} onChange={(e) => setDPlayer3(e.target.value)} className="w-full bg-gray-950 border border-gray-800 p-2.5 text-sm rounded-xl text-white focus:outline-none"><option value="">Pemain B1</option>{players.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select>
                      <select value={dPlayer4} onChange={(e) => setDPlayer4(e.target.value)} className="w-full bg-gray-950 border border-gray-800 p-2.5 text-sm rounded-xl text-white focus:outline-none"><option value="">Pemain B2</option>{players.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}</select>
                    </div>

                    {/* INTERACTIVE SCOREBOARD */}
                    <div className="bg-gray-900 border border-gray-800 p-6 rounded-3xl shadow-xl text-center flex flex-col justify-between">
                      <div>
                        <h3 className="text-lg font-bold text-white">Papan Poin Live 21</h3>
                        <p className="text-[11px] text-gray-400 mt-0.5">Ketuk tombol + dan - untuk mengubah skor</p>
                      </div>
                      
                      <div className="grid grid-cols-2 gap-4 my-6">
                        <div className="bg-indigo-950/40 p-3 rounded-2xl border border-indigo-900/60 flex flex-col items-center">
                          <span className="text-[10px] font-bold text-indigo-400 uppercase tracking-wider mb-2">TIM A</span>
                          <div className="text-4xl font-black text-white py-2">{scoreA}</div>
                          <div className="flex gap-2 w-full mt-2">
                            <button onClick={() => setScoreA(prev => Math.max(0, prev - 1))} className="flex-1 py-2 rounded-xl bg-gray-800 hover:bg-gray-700 font-bold text-base text-gray-300 transition-all">-</button>
                            <button onClick={() => setScoreA(prev => prev + 1)} className="flex-1 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold text-base text-white transition-all">+</button>
                          </div>
                        </div>

                        <div className="bg-red-950/40 p-3 rounded-2xl border border-red-900/60 flex flex-col items-center">
                          <span className="text-[10px] font-bold text-red-400 uppercase tracking-wider mb-2">TIM B</span>
                          <div className="text-4xl font-black text-white py-2">{scoreB}</div>
                          <div className="flex gap-2 w-full mt-2">
                            <button onClick={() => setScoreB(prev => Math.max(0, prev - 1))} className="flex-1 py-2 rounded-xl bg-gray-800 hover:bg-gray-700 font-bold text-base text-gray-300 transition-all">-</button>
                            <button onClick={() => setScoreB(prev => prev + 1)} className="flex-1 py-2 rounded-xl bg-red-600 hover:bg-red-500 font-bold text-base text-white transition-all">+</button>
                          </div>
                        </div>
                      </div>

                      <div className="space-y-2">
                        <button onClick={saveMatchResult} className="w-full py-2.5 bg-emerald-500 font-bold text-gray-950 text-sm rounded-xl shadow-lg shadow-emerald-500/10 hover:bg-emerald-400 transition-all">Simpan &amp; Log Riwayat Game</button>
                        <button onClick={() => { setScoreA(0); setScoreB(0); }} className="w-full py-1.5 bg-gray-800 text-xs font-bold text-red-400 rounded-lg transition-all">Reset Score ke 0-0</button>
                      </div>
                    </div>

                    <div className="bg-gray-900 border border-gray-800 p-6 rounded-3xl shadow-xl max-h-[300px] overflow-y-auto">
                      <h3 className="text-sm font-bold text-gray-400 uppercase mb-2">Win Rate Skuad</h3>
                      {players.map(p => (
                        <div key={p.id} className="flex justify-between py-1.5 border-b border-gray-800 text-xs">
                          <span className="font-semibold">{p.name}</span>
                          <span className="text-emerald-400 font-bold">{p.stats?.played ? Math.round((p.stats.won / p.stats.played) * 100) : 0}% WR</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === 'ledger' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in fade-in duration-200">
                    <div className="bg-gray-900 border border-gray-800 p-6 rounded-3xl shadow-xl h-fit space-y-4">
                      <h3 className="text-base font-bold text-white">Catat Mutasi Kas Skuad</h3>
                      <form onSubmit={addTransaction} className="space-y-4">
                        <div className="grid grid-cols-2 gap-2">
                          <button type="button" onClick={() => setTxType('credit')} className={`py-1.5 rounded-lg text-xs font-bold border transition-all ${txType === 'credit' ? 'border-emerald-500 text-emerald-400 bg-emerald-950/20' : 'border-gray-800 text-gray-400'}`}>Uang Masuk</button>
                          <button type="button" onClick={() => setTxType('debit')} className={`py-1.5 rounded-lg text-xs font-bold border transition-all ${txType === 'debit' ? 'border-red-500 text-red-400 bg-red-950/20' : 'border-gray-800 text-gray-400'}`}>Uang Keluar</button>
                        </div>
                        
                        {txType === 'credit' && (
                          <div className="space-y-1">
                            <label className="text-[10px] text-gray-400 font-bold uppercase">Pilih Anggota Pembayar (Opsional):</label>
                            <select value={txPlayerId} onChange={(e) => setTxPlayerId(e.target.value)} className="w-full bg-gray-950 border border-gray-800 p-2 text-xs text-white rounded-xl">
                              <option value="">-- Bukan Anggota Inti --</option>
                              {players.map(p => (
                                <option key={p.id} value={p.id}>{p.name}</option>
                              ))}
                            </select>
                          </div>
                        )}

                        <input type="number" value={txAmount} onChange={(e) => setTxAmount(e.target.value)} placeholder="Jumlah Rp" className="w-full bg-gray-950 border border-gray-800 p-2.5 text-xs text-white rounded-xl" />
                        <input type="text" value={txDesc} onChange={(e) => setTxDesc(e.target.value)} placeholder="Keterangan Nota/Deskripsi" className="w-full bg-gray-950 border border-gray-800 p-2.5 text-xs text-white rounded-xl" />
                        
                        {/* INPUT UPLOAD BUKTI SLIP NOTA DENGAN KOMPRESI BAWAAN */}
                        <div className="space-y-1.5">
                          <label className="text-[10px] text-gray-400 font-bold uppercase">Lampirkan Bukti Slip / Foto Nota:</label>
                          <label className="flex flex-col items-center justify-center p-3 border border-dashed border-gray-700 hover:border-gray-550 rounded-xl cursor-pointer transition-all bg-gray-950/40">
                            <span className="text-xs text-gray-400 font-semibold">📸 Unggah File/Foto Baru</span>
                            <input type="file" accept="image/*" onChange={handleSlipImageUpload} className="hidden" />
                          </label>
                          {txSlip && (
                            <div className="relative inline-block mt-2">
                              <img src={txSlip} className="w-20 h-20 rounded-xl object-cover border border-emerald-500" />
                              <button type="button" onClick={() => setTxSlip(null)} className="absolute -top-2 -right-2 bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-bold">✕</button>
                            </div>
                          )}
                        </div>

                        <button type="submit" className="w-full py-2.5 bg-emerald-500 text-gray-950 font-bold text-xs rounded-xl hover:bg-emerald-400 transition-all">Simpan Laporan Kas</button>
                      </form>
                    </div>
                    
                    <div className="lg:col-span-2 space-y-3 max-h-[500px] overflow-y-auto pr-1">
                      {transactions.map(t => (
                        <div key={t.id} className="p-4 bg-gray-900 border border-gray-800 rounded-xl flex justify-between items-center hover:bg-gray-900/40 transition-all">
                          <div className="flex items-center gap-3">
                            {t.slip && (
                              <button onClick={() => setSelectedSlip(t.slip)} className="w-10 h-10 rounded-lg overflow-hidden border border-gray-700 bg-gray-950 relative hover:border-emerald-500 transition-all group">
                                <img src={t.slip} className="w-full h-full object-cover" />
                                <span className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center text-[8px] font-bold text-white tracking-widest">BUKA</span>
                              </button>
                            )}
                            <div>
                              <span className="text-sm font-bold text-white block">{t.description}</span>
                              <span className="text-[10px] text-gray-400">{t.date}</span>
                            </div>
                          </div>
                          <div className="flex items-center gap-2">
                            <span className={`text-sm font-black ${t.type === 'credit' ? 'text-emerald-400' : 'text-red-400'}`}>Rp {t.amount.toLocaleString('id-ID')}</span>
                            <button onClick={() => removeTransaction(t.id)} className="text-red-500 text-xs px-2 py-1 hover:bg-red-500/20 rounded transition-all">✕</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === 'tactical' && (
                  <div className="flex flex-col lg:flex-row gap-6 bg-gray-900 border border-gray-800 p-6 rounded-3xl shadow-xl items-center justify-center animate-in fade-in duration-200">
                    <div className="w-full lg:w-1/3 space-y-2">
                      <h3 className="text-base font-bold text-white">Strategi Court Planner</h3>
                      <p className="text-xs text-gray-400">Geser titik lingkaran pemain untuk menyusun pola tanding tim ganda secara visual sebelum bermain.</p>
                      <button onClick={redrawCanvas} className="w-full mt-4 py-2 bg-red-950 border border-red-900 text-red-400 font-bold text-xs rounded-xl hover:bg-red-900 transition-all">Copot Coretan Lapangan 🧹</button>
                    </div>
                    <canvas ref={canvasRef} width="300" height="400" onMouseDown={handleCanvasMouseDown} onMouseMove={handleCanvasMouseMove} onMouseUp={handleCanvasMouseUpOrLeave} onMouseLeave={handleCanvasMouseUpOrLeave} onTouchStart={handleCanvasTouchStart} onTouchMove={handleCanvasTouchMove} onTouchEnd={handleCanvasMouseUpOrLeave} className="border border-gray-800 rounded-2xl bg-emerald-950 touch-none shadow-2xl cursor-crosshair" />
                  </div>
                )}
              </main>

              {/* SLIP NOTA LIGHTBOX PREVIEW MODAL */}
              {selectedSlip && (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4" onClick={() => setSelectedSlip(null)}>
                  <div className="relative max-w-sm w-full bg-gray-900 border border-gray-800 rounded-3xl p-4 animate-in zoom-in-95 duration-200" onClick={(e) => e.stopPropagation()}>
                    <button onClick={() => setSelectedSlip(null)} className="absolute -top-3 -right-3 bg-red-600 text-white w-7 h-7 rounded-full flex items-center justify-center font-bold shadow-lg">✕</button>
                    <img src={selectedSlip} alt="Nota" className="w-full h-auto rounded-xl object-contain bg-gray-950 max-h-[75vh]" />
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
